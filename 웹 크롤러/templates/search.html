<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>검색결과</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        .movie-item { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #ccc; padding-bottom: 20px; }
        .movie-img { width: 150px; border-radius: 8px; }
        .movie-info { flex: 1; }
        .badge { background: #e5e5e5; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; color: #333; }
    </style>
</head>
<body>
    <main class="container">
        <hgroup>
            <h1>🎬 '{{ keyword }}' 결과</h1>
            <p>검색된 영화 정보들을 나열합니다.</p>
        </hgroup>

        <a href="/" role="button" class="outline" style="margin-bottom: 20px;">다시 검색하기</a>

        <section>
            {% for i, movie in movies %}
            <div class="movie-item">
                <img src="{{ movie.img }}" class="movie-img" alt="포스터">
                <div class="movie-info">
                    <h3>{{ movie.title }}</h3>
                    <p>
                        <span class="badge">⭐ 평점: {{ movie.rating }}</span>
                        <span class="badge">📅 개봉: {{ movie.open_date }}</span>
                    </p>
                    <p><strong>👥 출연진:</strong> {{ movie.cast }}</p>
                    <a href="{{ movie.link }}" target="_blank" role="button">상세보기 및 예매</a>
                </div>
            </div>
            {% endfor %}
        </section>
    </main>
</body>
</html>
